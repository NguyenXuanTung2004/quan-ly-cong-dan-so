<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Hệ thống Quản lý Công dân số</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">


    <div class="login-container">
        <form id="loginForm" class="login-form" role="form" aria-label="Form đăng nhập">
            <div class="form-header">
                <i class="fa-solid fa-user-shield"></i>
                <h2>Đăng Nhập Hệ Thống</h2>
            </div>

            <div class="input-group">
                <label for="soDinhDanh">Số Định Danh Cá Nhân :</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-user" aria-hidden="true"></i>
                    <input type="text" id="soDinhDanh" name="soDinhDanh" placeholder="Nhập số định danh..." required autofocus>
                </div>
            </div>
            
            <div class="input-group">
                <label for="matKhau">Mật Khẩu:</label>
                <div class="input-with-icon">
                    <i class="fa-solid fa-lock" aria-hidden="true"></i>
                    <input type="password" id="matKhau" name="matKhau" placeholder="Nhập mật khẩu..." required>
                </div>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Ghi nhớ</label> </div>
                <a href="#" class="forgot-password">Quên mật khẩu?</a>
            </div>

            <button type="submit">Đăng Nhập</button>

            <div id="message" class="message-box" role="status" aria-live="polite"></div>

            <div class="register-link">
                <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
            </div>
            <div class="back-to-home-link">
                <a href="index.html">
                    <i class="fa-solid fa-arrow-left"></i> Quay lại Trang chủ
                </a>
            </div>
        </form>
    </div>
    
    <script src="auth.js"></script>

</body>
</html>
